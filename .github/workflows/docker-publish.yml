# ── GitHub Actions: Build & Push Multi-arch Docker Image to GHCR ──────
# Triggers: push to main, tags (v*), manual dispatch, pull_request
# Requires: Repo Settings > Actions > General > Workflow permissions: "Read and write"
#           GHCR: Pushed to ghcr.io/OWNER/REPO

name: Build & Publish Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional tag override (e.g., v1.0.0-rc1)'
        required: false
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # BUILD TEST — Runs on PRs and push, validates Dockerfile builds
  # ═══════════════════════════════════════════════════════════════════
  build-test:
    name: Build Test (no push)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug - Full workspace listing
        run: |
          echo "=== Root ==="
          ls -la
          echo ""
          echo "=== chat/ ==="
          ls -la chat/ || true
          echo ""
          echo "=== chat/ui/ ==="
          ls -la chat/ui/ || true
          echo ""
          if [ -d "chat/ui/assets" ]; then
            echo "=== chat/ui/assets/ ==="
            ls -la chat/ui/assets/
          else
            echo "chat/ui/assets NOT FOUND!"
          fi
          echo ""
          echo "=== agent/ ==="
          ls -la agent/ || true
          echo ""
          echo "=== kb/ ==="
          ls -la kb/ || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest

      - name: Build Docker image (single arch, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test-${{ github.sha }}
          load: true
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VCS_URL=${{ github.server_url }}/${{ github.repository }}

  # ═══════════════════════════════════════════════════════════════════
  # BUILD & PUSH — Multi-arch, pushes to GHCR
  # ═══════════════════════════════════════════════════════════════════
  build-and-push:
    name: Build & Push Multi-arch
    runs-on: ubuntu-latest
    timeout-minutes: 35
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug - Verify build context files
        run: |
          echo "=== Repository: ${{ github.repository }} ==="
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "SHA: ${{ github.sha }}"
          echo ""
          echo "=== Root files ==="
          find . -maxdepth 1 -type f | sort
          echo ""
          echo "=== chat/ ==="
          find chat -type f | sort
          echo ""
          echo "=== chat/ui/ ==="
          find chat/ui -type f | sort
          echo ""
          echo "=== chat/ui/assets/ (should have JS/CSS) ==="
          ls -la chat/ui/assets/ 2>/dev/null || echo "MISSING!"
          echo ""
          echo "=== agent/ ==="
          find agent -type f -name "*.py" | sort
          echo ""
          echo "=== kb/ ==="
          find kb -type f -name "*.py" | sort

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest
          driver-opts: |
            image=moby/buildkit:v0.16.16.0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event.inputs.tag != '' && github.event_name == 'workflow_dispatch' }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          pull: true
          build-args: |
            BUILD_DATE=${{ steps.meta.outputs.created }}
            VCS_REF=${{ github.sha }}
            VCS_URL=${{ github.server_url }}/${{ github.repository }}

      - name: Image digest
        run: |
          echo "Image pushed to GHCR"
          echo "Repository: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"
          for tag in ${{ steps.meta.outputs.tags }}; do
            echo "  - docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$tag"
          done

      - name: Verify GHCR image exists
        if: success()
        run: |
          echo "Waiting for registration..."
          sleep 10
          curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://ghcr.io/v2/${{ env.IMAGE_NAME }}/tags/list" | jq . || true