# ── NV-Agent CI Pipeline ────────────────────────────────────
# Runs on every push and PR to main:
#   1. Lint (ruff)
#   2. Type check (mypy) - allow failures
#   3. Tests (pytest) - fully mocked, no external API needed
#   4. Docker build (verify container builds) - verify only

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    continue-on-error: true  # Allow failures - mypy can be noisy
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mypy
          pip install -r requirements.txt

      - name: Type check with mypy
        run: mypy . --ignore-missing-imports --config-file pyproject.toml

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
          pip install -e .

      - name: Run tests
        run: pytest tests/ -v --tb=short -m "unit or api"
        env:
          # Tests use mocks in conftest.py - no real API key needed
          NVIDIA_API_KEY: nvapi-test-ci-key
          PYTHONPATH: .

  docker:
    name: Docker Build (verify)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: nv-agent:ci-test

      - name: Verify container starts
        run: |
          docker run -d --name nv-agent-ci \
            -e NVIDIA_API_KEY=nvapi-test-ci-key \
            -e LOG_LEVEL=INFO \
            -p 8001:8000 \
            nv-agent:ci-test
          # Wait for startup
          for i in {1..30}; do
            if curl -sf http://localhost:8001/api/health; then
              echo "Health check passed"
              break
            fi
            sleep 1
          done
          docker stop nv-agent-ci || true
          docker rm nv-agent-ci || true