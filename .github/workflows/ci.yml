# ── NV-Agent CI Pipeline ────────────────────────────────────
# Runs on every push and PR to main:
#   1. Lint (ruff)
#   2. Type check (mypy) - allow failures
#   3. Tests (pytest) - fully mocked, no external API needed
#   4. Docker build (verify container builds) - verify only

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff

      - name: Lint with ruff
        run: ruff check .
        continue-on-error: false

      - name: Check formatting
        run: ruff format --check .
        continue-on-error: false

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mypy
          pip install -r requirements.txt

      - name: Type check with mypy
        run: |
          mypy . --config-file pyproject.toml || true
        continue-on-error: true

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y poppler-utils libmagic1

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
          pip install -e .

      - name: Run tests
        run: pytest tests/ -v --tb=short -m "unit or api" --maxfail=5
        env:
          NVIDIA_API_KEY: nvapi-test-ci-key
          PYTHONPATH: .
        continue-on-error: false

  docker:
    name: Docker Build (verify)
    runs-on: ubuntu-latest
    needs: [lint, test]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: nv-agent:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify container starts
        run: |
          docker run -d --name nv-agent-ci \
            -e NVIDIA_API_KEY=nvapi-test-ci-key \
            -e LOG_LEVEL=DEBUG \
            -p 8001:8000 \
            nv-agent:ci-test
          # Wait for startup with better logging
          for i in {1..60}; do
            if curl -sf http://localhost:8001/api/health 2>/dev/null; then
              echo "Health check passed"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "Health check timed out - showing container logs:"
              docker logs nv-agent-ci 2>&1 | tail -50
            fi
            sleep 2
          done
          docker stop nv-agent-ci || true
          docker rm nv-agent-ci || true
        continue-on-error: true