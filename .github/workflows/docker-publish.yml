# ── GitHub Actions: Build & Push Multi-arch Docker Image to GHCR ──────
# Triggers: push to main, tags (v*), manual dispatch
# Requires: Settings → Actions → General → Workflow permissions: "Read and write"
#           Packages: GHCR pushed to ghcr.io/OWNER/nv-agent

name: Build & Publish Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']          # v1.0.0, v1.2.3, etc.
  pull_request:
    branches: [main]
  workflow_dispatch:      # Manual trigger in Actions tab
    inputs:
      tag:
        description: 'Optional tag override (e.g., v1.0.0-rc1)'
        required: false
        type: string

permissions:
  contents: read
  packages: write         # Required to push to GHCR
  id-token: write         # For provenance attestation

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/nv-agent

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up QEMU for multi-arch
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3. Set up Docker Buildx (multi-arch builder)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest
          driver-opts: |
            image=moby/buildkit:v0.16.0

      # 4. Login to GHCR
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. Extract metadata (tags, labels)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event.inputs.tag != '' }}

      # 6. Build & push multi-arch
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build args (optional — can pass version info)
          build-args: |
            BUILD_DATE=${{ steps.meta.outputs.created }}
            VCS_REF=${{ github.sha }}
            VCS_URL=${{ github.server_url }}/${{ github.repository }}

      # 7. Output summary
      - name: Image digest
        if: github.event_name != 'pull_request'
        run: |
          echo "Image pushed to GHCR"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
          for tag in ${{ steps.meta.outputs.tags }}; do
            echo "  - docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$tag"
          done

