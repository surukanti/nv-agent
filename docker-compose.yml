# ── NV-Agent Docker Compose ─────────────────────────────────
# Usage:
#   docker compose up -d                    # Start all services (FAISS + Qdrant + ChromaDB)
#   docker compose logs -f                  # Follow logs
#   docker compose down                     # Stop all services
#   docker compose down -v                  # Stop and remove volumes
#
# To add documents, place them in the ./data directory on the host
# before starting, or upload via the browser UI after startup.
#
# Vector Store Selection (via NV_AGENT_VECTOR_STORE env var):
# - faiss:   Default, zero-infrastructure, uses nv-agent-index volume
# - qdrant:  High-performance Rust vector DB (service: qdrant:6333)
# - chromadb: Python-based embedding DB (service: chromadb:8000)

services:
  nv-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nv-agent
    ports:
      - "${NV_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - NV_HOST=0.0.0.0
      - NV_PORT=8000
      # Vector store configuration (can be overridden in .env)
      - NV_AGENT_VECTOR_STORE=${NV_AGENT_VECTOR_STORE:-faiss}
      # Qdrant
      - NV_AGENT_QDRANT_HOST=${NV_AGENT_QDRANT_HOST:-qdrant}
      - NV_AGENT_QDRANT_PORT=${NV_AGENT_QDRANT_PORT:-6333}
      # ChromaDB
      - NV_AGENT_CHROMADB_PERSIST_DIR=${NV_AGENT_CHROMADB_PERSIST_DIR:-/app/kb/index/chromadb}
    volumes:
      # Persist documents and sessions across container restarts
      # Mount host data directory for auto-ingestion on startup
      - ./data:/app/data
      - nv-agent-index:/app/kb/index
      # Named volume for session persistence (separate from host data)
      - nv-agent-sessions:/app/data/sessions
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Qdrant Vector Database ───────────────────────────────────────
  # High-performance vector database written in Rust
  # Docs: https://qdrant.tech/documentation/
  qdrant:
    image: qdrant/qdrant:v1.18.0
    container_name: nv-agent-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── ChromaDB Vector Database ─────────────────────────────────────
  # Open-source embedding database
  # Docs: https://docs.trychroma.com/
  chromadb:
    image: chromadb/chroma:1.0.6
    container_name: nv-agent-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chromadb-data:/chroma/chroma
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
      - ANONYMIZED_TELEMETRY=False
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  nv-agent-index:
    driver: local
  nv-agent-sessions:
    driver: local
  qdrant-data:
    driver: local
  chromadb-data:
    driver: local